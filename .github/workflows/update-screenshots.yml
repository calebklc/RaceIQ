name: Update dashboard screenshots in README

on:
  push:
    branches:
      - main
    paths:
      - "assets/screenshots/**"

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Append dashboard screenshots to assets/screenshots/README.md
        run: |
          python3 - <<'PYEOF'
          import re, pathlib

          readme = pathlib.Path("assets/screenshots/README.md").read_text()
          block = (
            "\n### F1 2025 Live Dashboard\n\n"
            "![F1 2025 Live Dashboard](F1LiveDashboard.png)\n\n"
            "### Forza Motorsport Live Dashboard\n\n"
            "![Forza Motorsport Live Dashboard](ForzaLiveDashboard.png)\n\n"
            "### Assetto Corsa Competizione Live Dashboard\n\n"
            "![Assetto Corsa Competizione Live Dashboard](AccLiveDashboard.png)\n"
          )

          marker_start = "<!-- dashboard-screenshots-start -->"
          marker_end = "<!-- dashboard-screenshots-end -->"

          if marker_start in readme:
            updated = re.sub(
              r"<!-- dashboard-screenshots-start -->.*?<!-- dashboard-screenshots-end -->",
              f"{marker_start}{block}{marker_end}",
              readme,
              flags=re.DOTALL,
            )
          else:
            updated = readme.rstrip("\n") + f"\n\n{marker_start}{block}{marker_end}\n"

          pathlib.Path("assets/screenshots/README.md").write_text(updated)
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/screenshots/README.md
          git diff --cached --quiet || git commit -m "chore: update dashboard screenshots [skip ci]"
          git push
