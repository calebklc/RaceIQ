<svg viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="cf" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#14172a"/>
      <rect x="0" y="0" width="6" height="6" fill="#1c1f32" rx="0.5"/>
      <rect x="6" y="6" width="6" height="6" fill="#1c1f32" rx="0.5"/>
      <line x1="0" y1="6" x2="6" y2="6" stroke="#22253a" stroke-width="0.5"/>
      <line x1="6" y1="0" x2="12" y2="0" stroke="#22253a" stroke-width="0.5"/>
    </pattern>
    <pattern id="perf" patternUnits="userSpaceOnUse" width="9" height="9">
      <rect width="9" height="9" fill="#111315"/>
      <circle cx="4.5" cy="4.5" r="2.5" fill="#0c0d0f"/>
      <circle cx="4.5" cy="4.5" r="1.5" fill="#090a0b"/>
    </pattern>
    <filter id="led-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="wheel-shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <radialGradient id="dial-face" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2d3250"/>
      <stop offset="60%" stop-color="#1a1d30"/>
      <stop offset="100%" stop-color="#0a0c15"/>
    </radialGradient>
    <linearGradient id="display-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161928"/>
      <stop offset="100%" stop-color="#0a0c15"/>
    </linearGradient>
    <linearGradient id="f1-red" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8001d"/>
      <stop offset="100%" stop-color="#cc0018"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.07"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="grip-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.45"/>
    </linearGradient>
    <clipPath id="wclip">
